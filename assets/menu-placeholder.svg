<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Menu local de simulador</title>
  <desc id="desc">Imagen placeholder para ejecutar el simulador local sin depender de un asset privado.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f1e2"/>
      <stop offset="100%" stop-color="#f0d2b7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf4"/>
      <stop offset="100%" stop-color="#fff2e6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="170" fill="#d97132" opacity="0.14"/>
  <circle cx="160" cy="1420" r="190" fill="#1f6c5c" opacity="0.12"/>
  <rect x="110" y="110" width="980" height="1380" rx="44" fill="url(#card)" stroke="#c98754" stroke-width="5"/>
  <text x="600" y="240" text-anchor="middle" font-size="62" font-family="Georgia, serif" fill="#8a3d19">Trabix Simulator</text>
  <text x="600" y="300" text-anchor="middle" font-size="28" font-family="Georgia, serif" fill="#6b5545">Menú local placeholder para pruebas manuales</text>

  <g font-family="Georgia, serif" fill="#2a1f17">
    <text x="180" y="420" font-size="34">Granizados sin licor</text>
    <text x="900" y="420" font-size="30" text-anchor="end">$8.000</text>
    <text x="180" y="470" font-size="24" fill="#6b5545">Maracuyá, Mango Biche, Fresa, Limón</text>

    <text x="180" y="610" font-size="34">Granizados con licor</text>
    <text x="900" y="610" font-size="30" text-anchor="end">$12.000</text>
    <text x="180" y="660" font-size="24" fill="#6b5545">Aguardiente, Ron, Vodka</text>

    <text x="180" y="800" font-size="34">Promo pareja</text>
    <text x="900" y="800" font-size="30" text-anchor="end">$22.000</text>
    <text x="180" y="850" font-size="24" fill="#6b5545">Se usa solo para pruebas del simulador</text>
  </g>

  <g stroke="#d9c4a6" stroke-width="3">
    <line x1="180" y1="505" x2="910" y2="505"/>
    <line x1="180" y1="695" x2="910" y2="695"/>
    <line x1="180" y1="885" x2="910" y2="885"/>
  </g>

  <text x="600" y="1130" text-anchor="middle" font-size="26" font-family="Georgia, serif" fill="#1f6c5c">
    Reemplaza este archivo con tu menú real cuando quieras.
  </text>
  <text x="600" y="1180" text-anchor="middle" font-size="22" font-family="Georgia, serif" fill="#6b5545">
    El simulador solo necesita una imagen local válida para la ruta “Ver Menú”.
  </text>

  <rect x="250" y="1270" width="700" height="120" rx="28" fill="#fff8ef" stroke="#d9c4a6" stroke-width="3"/>
  <text x="600" y="1340" text-anchor="middle" font-size="24" font-family="'Courier New', monospace" fill="#8a3d19">
    BOT_MODE=simulator
  </text>
  <text x="600" y="1380" text-anchor="middle" font-size="22" font-family="'Courier New', monospace" fill="#6b5545">
    http://127.0.0.1:8080/simulator
  </text>
</svg>
